<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Last Pick — Stop scrolling. Start watching.</title>
<!-- note: file is still named FinalPick.html; app/brand is "Last Pick" -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' rx='28' fill='%2313161f'/%3E%3Cpath d='M30 34h12v32h20v12H30Z' fill='%23e7edff'/%3E%3Cpath d='M64 33 96 50 64 67Z' fill='%232e6bff'/%3E%3Cpath d='M64 33H76V80L70 92 64 80Z' fill='%2322d3ee'/%3E%3C/svg%3E" />
<style>
  :root{
    --bg:#0a0e1a; --panel:#15172130; --panel2:#161c2e; --card:#19203a;
    --ink:#f3f4f8; --muted:#94a0c0; --line:#273150;
    --brand:#3b8cff; --brand2:#22d3ee; --accent:#5ad1ff; --pop:#7c8cff;
    --good:#5ad19a; --bad:#ff6b7d; --radius:18px;
    --grad:linear-gradient(135deg,#2e6bff,#3b8cff 48%,#22d3ee);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow-x:hidden}
  body{
    background:radial-gradient(1200px 600px at 50% -10%,#102246 0%,var(--bg) 58%) fixed;
    color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;justify-content:center;align-items:flex-start;min-height:100%;
  }
  #app{
    width:100%;max-width:460px;min-height:100vh;position:relative;
    padding:0 16px 120px;
  }
  /* ---------- desktop: frame the app like a phone screen ---------- */
  @media (min-width:540px){
    body{ background:#06080e; align-items:flex-start; }
    #app{
      background:radial-gradient(900px 520px at 50% -6%,#10203f 0%,#0a0e1a 60%);
      border-left:1px solid #1d2a47; border-right:1px solid #1d2a47;
      box-shadow:0 0 0 1px #ffffff07, 0 0 130px -18px #2e6bff3a, 0 40px 130px -34px #000;
    }
  }
  /* ---------- header ---------- */
  header{
    position:sticky;top:0;z-index:30;margin:0 -16px;padding:13px 16px 12px;
    background:linear-gradient(180deg,#112a52 0%,#0b1224f5 100%);
    backdrop-filter:blur(18px) saturate(1.4);
    border-bottom:1px solid #213a66;
    box-shadow:0 8px 26px -14px #001a40;
  }
  header::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:1px;
    background:linear-gradient(90deg,#fff0,#2e6bffcc,#22d3eecc,#fff0)}
  .brandrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:11px}
  .blogo{font-size:25px;line-height:1;filter:drop-shadow(0 3px 9px #2e6bffaa)}
  .logo{font-weight:900;letter-spacing:1.3px;font-size:20px;line-height:1;
    background:linear-gradient(92deg,#4f9dff,#5ad1ff 46%,#7cf0ff);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 12px #2e6bff55)}
  .tag{font-size:10.5px;color:#93b2dd;margin-top:4px;letter-spacing:.4px;font-weight:600}
  .hbtns{display:flex;gap:7px;align-items:center}
  .ghost{background:#ffffff10;border:1px solid var(--line);color:var(--ink);border-radius:999px;
    padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer}
  .ghost:active{transform:scale(.96)}
  /* ---------- generic ---------- */
  h2{font-size:20px;margin:18px 2px 4px}
  .sub{color:var(--muted);font-size:13px;margin:0 2px 14px;line-height:1.45}
  .panel{background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
  button{font-family:inherit}
  .btn{display:block;width:100%;border:0;border-radius:14px;padding:15px;font-size:16px;font-weight:800;
    background:var(--grad);color:#1a0a12;cursor:pointer;letter-spacing:.3px}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{filter:grayscale(.6) brightness(.7);cursor:not-allowed}
  .btn.secondary{background:#ffffff12;color:var(--ink);border:1px solid var(--line)}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:#ffffff08;color:var(--ink);border-radius:999px;
    padding:9px 13px;font-size:13px;font-weight:600;cursor:pointer;user-select:none}
  .chip.on{background:var(--grad);color:#1a0a12;border-color:transparent}
  .chip.svc.on{background:linear-gradient(135deg,#7c8cff,#6ce0c2);color:#08121a}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:#ffffff12;color:var(--muted)}
  .wgrp{display:flex;align-items:flex-start;gap:9px;margin:0 0 8px}
  .wlbl{font-size:11px;font-weight:800;white-space:nowrap;padding-top:8px;min-width:64px}
  .wrow{display:flex;flex-wrap:wrap;gap:7px;flex:1}
  .wbtn{font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:11px;border:1px solid var(--line);
    background:#ffffff10;color:var(--ink);cursor:pointer;transition:transform .08s,background .15s;-webkit-tap-highlight-color:transparent}
  .wbtn:active{transform:scale(.95)}
  .wbtn.stream{border-color:#2e7d5a66;background:#1db98a1a;color:#a9f0d0}
  .wbtn.free{border-color:#3a8f5a66;background:#7ee0a018;color:#bff5d4}
  .wbtn.rent{border-color:var(--line);color:var(--muted)}
  .urail{display:flex;gap:10px;overflow-x:auto;padding:2px 0 4px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
  .urail::-webkit-scrollbar{height:0}
  .urail-i{flex:0 0 auto;width:92px;cursor:pointer;scroll-snap-align:start}
  .urail-i:active{transform:scale(.96)}
  .urail-p{width:92px;height:138px;border-radius:10px;background:#222 center/cover;border:1px solid var(--line);position:relative;overflow:hidden}
  .urail-i.on .urail-p{border-color:#7c5cff;box-shadow:0 0 0 2px #7c5cff88}
  .urail-badge{position:absolute;left:0;right:0;bottom:0;background:#7c5cffdd;color:#fff;font-size:10px;font-weight:800;text-align:center;padding:2px 0}
  .urail-t{font-size:11px;font-weight:700;color:var(--ink);margin-top:5px;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .urail-y{font-size:10px;color:var(--muted)}
  .tchip{font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:999px;border:1px solid #5a4a86;
    background:#ffffff0c;color:#c9bff0;cursor:pointer;white-space:nowrap}
  .tchip.on{background:#7c5cff;border-color:#7c5cff;color:#fff}
  .nbadge{position:absolute;top:2px;right:calc(50% - 20px);min-width:16px;height:16px;padding:0 4px;border-radius:999px;
    background:#ff3b5c;color:#fff;font-size:10px;font-weight:800;line-height:16px;text-align:center;box-shadow:0 0 0 2px var(--bg)}
  .notif-item{display:flex;gap:12px;align-items:flex-start;padding:13px 12px;border:1px solid var(--line);
    border-radius:14px;margin-bottom:9px;background:#ffffff06;position:relative}
  .notif-item.unread{background:#3b8cff12;border-color:#3b8cff44}
  .ni-ic{font-size:20px;flex:0 0 auto;line-height:1.2}
  .ni-t{font-size:14px;font-weight:700;color:var(--ink);line-height:1.35}
  .ni-b{font-size:12.5px;color:#c7cbe0;margin-top:2px;line-height:1.45}
  .ni-time{font-size:11px;color:var(--muted);margin-top:5px}
  .ni-dot{position:absolute;top:14px;right:13px;width:9px;height:9px;border-radius:50%;background:#ff3b5c}
  .center{text-align:center}
  .muted{color:var(--muted)}
  .hidden{display:none!important}
  .fadein{animation:fade .45s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .progress{height:6px;border-radius:6px;background:#ffffff12;overflow:hidden;margin:4px 2px 16px}
  .progress > i{display:block;height:100%;background:var(--grad);width:0;transition:width .35s}
  /* ---------- onboarding rating card ---------- */
  .ob-card{position:relative;border-radius:22px;overflow:hidden;border:1px solid var(--line);
    background:var(--card);min-height:340px;display:flex;flex-direction:column;justify-content:flex-end}
  .poster{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.9}
  .poster::after{content:"";position:absolute;inset:0;background:linear-gradient(#0000 25%,#0b0c12 96%)}
  .ob-meta{position:relative;padding:18px;z-index:2}
  .ob-meta h3{margin:0 0 4px;font-size:22px}
  .ob-genres{font-size:12px;color:#d7d9e6}
  .rate-row{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:14px}
  .rate{border:1px solid var(--line);background:#ffffff0e;border-radius:13px;padding:10px 4px;text-align:center;
    cursor:pointer;font-size:11px;font-weight:700;color:var(--ink);line-height:1.3}
  .rate .em{font-size:20px;display:block;margin-bottom:3px}
  .rate:active{transform:scale(.94)}
  .rate.love:active{background:#3b8cff22}
  /* ---------- pick card ---------- */
  .pick{border-radius:24px;overflow:hidden;border:1px solid var(--line);position:relative;background:var(--card)}
  .pick .top{position:relative;height:340px;background-size:cover;background-position:center top}
  .pick .top::after{content:"";position:absolute;inset:0;background:linear-gradient(#0b0c1200 62%,#1d2030 100%)}
  .pick .body{padding:16px 18px 18px}
  .pick h3{margin:0;font-size:25px;line-height:1.1}
  .pick .yr{color:var(--muted);font-weight:600;font-size:14px}
  .reasons{margin:12px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px}
  .reasons li{font-size:13.5px;display:flex;gap:9px;align-items:flex-start;color:#dcdef0}
  .reasons li .tick{color:var(--accent);font-weight:900;flex:none}
  .where{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
  .svcbadge{font-weight:800;font-size:12px;padding:6px 11px;border-radius:9px;background:#ffffff12;border:1px solid var(--line)}
  .scorebar{display:flex;height:9px;border-radius:6px;overflow:hidden;margin-top:14px;border:1px solid var(--line)}
  .scorebar > span{height:100%}
  .legend{display:flex;flex-wrap:wrap;gap:8px 12px;margin-top:8px}
  .legend div{font-size:10.5px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .legend i{width:9px;height:9px;border-radius:2px;display:inline-block}
  .fb-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:14px}
  .fb{border:1px solid var(--line);background:#ffffff0c;border-radius:13px;padding:12px 8px;font-size:13px;
    font-weight:700;cursor:pointer;text-align:center;color:var(--ink)}
  .fb:active{transform:scale(.96)}
  .fb.love{border-color:#3b8cff66}.fb.never{border-color:#ff6b7d55;color:#ffb3bd}
  .fb.on{background:#3b8cff2e;border-color:#3b8cff;color:#cfe3ff;font-weight:700}
  /* ---------- watchlist ---------- */
  .wl-item{display:flex;gap:12px;align-items:center;padding:11px;border:1px solid var(--line);
    border-radius:14px;background:#ffffff07;margin-bottom:9px}
  .wl-item .th{width:46px;height:64px;border-radius:8px;background-size:cover;background-position:center;flex:none}
  .wl-item .t{font-weight:700;font-size:14px}
  .wl-item .s{font-size:11px;color:var(--muted);margin-top:2px}
  .wl-rank{font-weight:900;color:var(--brand2);font-size:13px;margin-left:auto;flex:none}
  /* ---------- profile timeline (facebook-style posts) ---------- */
  .tl{display:flex;gap:10px;margin-bottom:14px;align-items:flex-start}
  .tl-av{width:38px;height:38px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:20px;color:#08121a;background:var(--grad)}
  .tl-main{flex:1;min-width:0;display:flex;gap:10px;align-items:flex-start}
  .tl-col{flex:1;min-width:0}
  .tl-bubble{background:#20263a;border:1px solid var(--line);border-radius:4px 16px 16px 16px;
    padding:9px 13px;position:relative}
  .tl-name{font-weight:800;font-size:13.5px;color:#eaf0ff}
  .tl-name b{color:#8fbaff}
  .tl-act{font-size:12.5px;color:var(--muted);margin-top:1px}
  .tl-text{font-size:14px;line-height:1.5;color:#e9edfb;margin-top:6px}
  .tl-meta{font-size:11px;color:var(--muted);margin:5px 4px 0;display:flex;gap:14px}
  .tl-meta span{cursor:default}
  .tl-poster{flex:none;width:62px;height:92px;border-radius:11px;background:#161c2e center/cover;
    border:1px solid var(--line);box-shadow:0 5px 14px -7px #000b;cursor:pointer}
  .tl-poster:active{transform:scale(.96)}
  .sp-tag{color:#ffcf8a;font-weight:700;font-size:12px}
  .sp-blur{filter:blur(6px);transition:filter .18s;cursor:pointer;border-radius:4px;user-select:none}
  .sp-blur.reveal{filter:none;cursor:auto;user-select:auto}
  .tl-badge{width:62px;height:92px;border-radius:11px;background:#161c2e;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:26px;flex:none}
  /* profile header with cover banner */
  .pfcover{height:76px;border-radius:16px;margin:10px 2px 0;border:1px solid var(--line);
    background:linear-gradient(120deg,#1c3a6e,#0e2748 55%,#123a52)}
  .pfrow{display:flex;align-items:flex-end;gap:13px;margin:-32px 12px 4px;position:relative}
  .pfav{width:66px;height:66px;border-radius:50%;border:3px solid #0b0e16;background:var(--grad);
    display:flex;align-items:center;justify-content:center;font-size:27px;font-weight:900;color:#08121a;flex:none}
  .pfrow .nm{font-size:20px;font-weight:900;line-height:1.1;text-shadow:0 1px 5px #000a}
  .pfrow .bi{font-size:12.5px;line-height:1.4;color:var(--muted);margin-top:2px}
  .pfcover{position:relative;background-size:cover;background-position:center}
  .pfcover::after{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(#0b0e1600 45%,#0b0e16aa)}
  /* full-bleed cover that fills the space where the top bar used to be */
  .pfcover.full{margin:0 -16px;height:172px;border-radius:0 0 22px 22px;border-left:0;border-right:0;border-top:0}
  .pfback{position:absolute;left:10px;top:12px;z-index:2;background:#0b0e16cc;border:1px solid var(--line);border-radius:20px;padding:6px 13px;font-size:13px;font-weight:700;color:#fff;cursor:pointer}
  .pfcambtn{position:absolute;right:9px;bottom:8px;z-index:2;background:#0b0e16cc;border:1px solid var(--line);
    border-radius:20px;color:#dfe6ff;font-size:12px;font-weight:700;padding:5px 11px;cursor:pointer}
  #coverov{position:fixed;inset:0;background:#05070cd8;z-index:60;display:flex;align-items:flex-end;justify-content:center;
    opacity:0;transition:opacity .25s}
  #coverov.open{opacity:1}
  .covwrap{background:#11151f;border:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;max-width:520px;
    max-height:78vh;overflow:auto;padding:14px 14px 26px}
  .covhead{display:flex;align-items:center;justify-content:space-between;font-weight:800;font-size:16px;margin-bottom:12px}
  .covgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .covopt{position:relative;height:120px;border-radius:12px;border:1px solid var(--line);background:#161c2e center/cover;
    cursor:pointer;overflow:hidden;display:flex;align-items:flex-end}
  .covopt span{width:100%;background:linear-gradient(#0000,#000c);color:#fff;font-size:11px;font-weight:600;padding:14px 7px 6px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .covopt:active{transform:scale(.97)}
  .covnone{align-items:center;justify-content:center;color:var(--muted);font-weight:700;font-size:13px;background:#161c2e}
  /* ---------- tabbar ---------- */
  /* For You feed rails */
  .rail-title{font-size:15px;font-weight:800;margin:20px 2px 10px;color:var(--ink);display:flex;align-items:center;gap:7px}
  .rail{display:flex;gap:11px;overflow-x:auto;padding:2px 2px 6px;scrollbar-width:none}
  .rail::-webkit-scrollbar{display:none}
  .fycard{flex:none;width:118px;cursor:pointer}
  .fycard:active{transform:scale(.96)}
  .fyposter{width:118px;height:177px;border-radius:13px;background:#161c2e center/cover;border:1px solid var(--line);box-shadow:0 6px 16px -8px #000a}
  .fytitle{font-size:12px;font-weight:600;margin-top:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:118px}
  .fysub{font-size:10.5px;color:var(--muted)}
  .fyhero{border-radius:18px;overflow:hidden;position:relative;height:210px;background:#161c2e center/cover;border:1px solid var(--line);margin-top:6px;cursor:pointer}
  .fyhero::after{content:"";position:absolute;inset:0;background:linear-gradient(#0b0e1600 40%,#0b0e16f0 100%)}
  .fyhero .hz{position:absolute;left:16px;right:16px;bottom:14px;z-index:2}
  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;justify-content:center;
    padding:0 12px calc(11px + env(safe-area-inset-bottom,0px));pointer-events:none;
    background:linear-gradient(180deg,#0c0d1400,#0c0d14 78%)}
  .tabbar .inner{width:100%;max-width:460px;display:flex;gap:0;pointer-events:auto;
    padding:7px 5px;border-radius:24px;position:relative;
    background:linear-gradient(180deg,#1c2031f2,#12141ff7);
    border:1px solid #313752;
    box-shadow:0 14px 36px -10px #000c, 0 1px 0 #ffffff14 inset, 0 0 0 1px #ffffff07 inset;
    backdrop-filter:blur(18px) saturate(1.3)}
  .tabbar .inner::before{content:"";position:absolute;top:0;left:18px;right:18px;height:1px;
    background:linear-gradient(90deg,#fff0,#ffffff30,#fff0)}
  .tabbar button{flex:1;min-width:0;background:none;border:0;color:#8a8fa6;cursor:pointer;position:relative;
    display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 0 7px;border-radius:14px;
    font-size:9px;font-weight:700;letter-spacing:.1px;
    transition:color .25s ease, transform .18s ease, background .25s ease}
  .tabbar .ic{font-size:18px;line-height:1;transition:transform .3s cubic-bezier(.34,1.56,.64,1), filter .25s ease}
  .tabbar button:not(.on):active{transform:scale(.9)}
  .tabbar button:not(.on):active .ic{transform:scale(.9)}
  .tabbar button.on{color:#fff;
    background:linear-gradient(180deg,#3b8cff22,#22d3ee0a);
    box-shadow:0 0 0 1px #3b8cff42 inset, 0 7px 20px -8px #2e6bff77}
  .tabbar button.on .ic{transform:translateY(-3px) scale(1.16);filter:drop-shadow(0 5px 11px #3b8cffcc)}
  .tabbar button.on::after{content:"";position:absolute;top:3px;left:50%;transform:translateX(-50%);
    width:16px;height:3px;border-radius:3px;background:linear-gradient(90deg,#2e6bff,#22d3ee);
    box-shadow:0 0 8px #3b8cffcc}
  /* center Last Pick logo button — the star of the bar */
  .tabbar .lpbtn{flex:0 0 auto;width:60px;height:60px;margin:-20px 8px 0;border-radius:50%;padding:0;
    background:radial-gradient(120% 120% at 50% 15%,#3f8bff,#1a4fd0 70%);border:3px solid #0f1220;
    box-shadow:0 12px 26px -6px #2e6bffbb, 0 0 0 1px #ffffff22 inset;
    display:flex;align-items:center;justify-content:center;color:#fff;overflow:visible}
  .tabbar .lpbtn svg{width:30px;height:30px;fill:#fff;filter:drop-shadow(0 2px 4px #0006)}
  .tabbar .lpbtn::after{display:none}
  .tabbar .lpbtn:active{transform:scale(.93)}
  .tabbar .lpbtn.on{background:radial-gradient(120% 120% at 50% 15%,#4f97ff,#2a63e6 70%);
    box-shadow:0 12px 30px -5px #3b8cffee, 0 0 0 2px #8fc0ffcc inset}
  .tabbar .lpbtn.on .ic{transform:none}
  /* slide-up nav sheet */
  #navback{position:fixed;inset:0;z-index:55;background:#0009;opacity:0;pointer-events:none;
    transition:opacity .3s ease;backdrop-filter:blur(2px)}
  #navback.open{opacity:1;pointer-events:auto}
  #navback.hidden{display:none}
  #navsheet{position:fixed;left:0;right:0;bottom:0;z-index:60;display:flex;justify-content:center;
    transform:translateY(110%);transition:transform .34s cubic-bezier(.32,.72,0,1);pointer-events:none}
  #navsheet.open{transform:translateY(0);pointer-events:auto}
  #navsheet.hidden{display:none}
  #navsheet .sheet{width:100%;max-width:460px;background:linear-gradient(180deg,#15203a,#0c1120);
    border:1px solid #273150;border-bottom:0;border-radius:26px 26px 0 0;
    padding:9px 16px calc(20px + env(safe-area-inset-bottom,0px));
    box-shadow:0 -18px 44px -14px #000d}
  #navsheet .grab{width:44px;height:5px;border-radius:5px;background:#394260;margin:4px auto 14px;cursor:pointer}
  .navgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .navitem{display:flex;flex-direction:column;align-items:center;gap:7px;padding:15px 6px;border-radius:16px;
    border:1px solid var(--line);background:#ffffff08;cursor:pointer;font-size:12px;font-weight:700;color:var(--muted);
    transition:transform .12s ease}

/* ----------------------------------------------------------------
   2. FEATURE SPACE + TASTE VECTOR
-----------------------------------------------------------------*/
const GENRES=["horror","comedy","thriller","action","drama","scifi","romance","animation","fantasy","crime","adventure","family","biopic","war","music","sports","musical"];
const SUBS=["supernatural","slasher","found_footage","revenge","creature","mystery","heist","superhero","coming_of_age","dark_comedy","satire","psychological","time_travel","space","monster","zombie","demon","home_invasion","buddy","rom_com","dystopia"];
const TONES=["dark","light","tense","funny","emotional","weird","uplifting","bleak"];
const PACES=["slow","balanced","fast"];

// Turn a movie into a numeric feature vector
function movieVector(m){
  const v={};
  GENRES.forEach(g=>v["g_"+g]= m.genres.includes(g)?1:0);
  SUBS.forEach(s=>v["s_"+s]= m.subgenres.includes(s)?1:0);
  TONES.forEach(t=>v["t_"+t]= m.tone.includes(t)?1:0);
  PACES.forEach(p=>v["p_"+p]= m.pacing===p?1:0);
  v["scare"]=m.scare; v["gore"]=m.gore; v["violence"]=m.violence; v["complexity"]=m.complexity;
  return v;
}
const MOVIE_VECS = Object.fromEntries(MOVIES.map(m=>[m.id,movieVector(m)]));

// blueprint event weights (7.1)
const EVENT_WEIGHT={ loved:5, liked:3, completed:1, rewatched:6, saved:0.7, want:0.9, auto_pick:4,
                     not_tonight:-0.5, disliked:-3, abandoned:-2, hated:-5 };
const SEEN_EVENTS=["completed","liked","loved","hated","abandoned","rewatched","disliked","auto_pick"];
function hasSeen(id){ const e=STATE.profiles.me.events[id]; return e && SEEN_EVENTS.includes(e); }

function buildTasteVector(profile){
  // weighted average of liked vectors minus disliked vectors
  const acc={}; let posW=0, negW=0;
  const add=(vec,w)=>{ for(const k in vec){ acc[k]=(acc[k]||0)+vec[k]*w; } };
  for(const [mid,ev] of Object.entries(profile.events)){
    const w=EVENT_WEIGHT[ev]; if(w===undefined||w===0&&ev!=="saved") {}
    if(w===undefined) continue;
    const vec=MOVIE_VECS[mid]; if(!vec) continue;
    add(vec,w);
    if(w>0) posW+=w; else negW+=Math.abs(w);
  }
  // normalise so vector isn't dominated by sheer volume
  const norm=Math.max(1,posW+negW);
  for(const k in acc) acc[k]=acc[k]/norm;
  return acc;
}
function cosine(a,b){
  let dot=0,na=0,nb=0; const keys=new Set([...Object.keys(a),...Object.keys(b)]);
  keys.forEach(k=>{const x=a[k]||0,y=b[k]||0; dot+=x*y; na+=x*x; nb+=y*y;});
  if(na===0||nb===0) return 0;
  return dot/(Math.sqrt(na)*Math.sqrt(nb));
}

-----------------------------------------------------------------*/
const MOOD_WEIGHTS = {
  scary:      {g_horror:.35,s_supernatural:.30,t_tense:.20,s_mystery:.10,scare:.5,t_funny:-.2,g_comedy:-.2},
  funny:      {g_comedy:.45,t_light:.25,t_funny:.25,rewatchable:.15,gore:-.25,t_bleak:-.2},

  date_night: {g_romance:.3,s_rom_com:.25,t_emotional:.2,t_light:.15,t_uplifting:.15,gore:-.4,scare:-.3},
  background: {rewatchable:.5,t_light:.25,complexity:-.4,t_funny:.15,scare:-.2},

  no_thinking:{g_action:.3,g_comedy:.25,t_light:.2,complexity:-.5,rewatchable:.25,t_uplifting:.1}
};
function moodFit(m, mood){
  if(!mood) return 0.55;
  const w=MOOD_WEIGHTS[mood]||{}; const vec=MOVIE_VECS[m.id];
  let s=0; for(const k in w) s+=w[k]*(vec[k]!==undefined?vec[k]:0);
  // squash to ~0..1
  return Math.max(0,Math.min(1, 0.5 + s*0.7));
}
function availabilityFit(m, services){
  const hit=m.providers.some(p=>services.includes(p));
  if(hit) return 1;
  if(m.rent) return 0.4;   // rentable but not on a subscribed service
  return 0;
}
function noveltyFit(m, profile, ctx){
  if(profile.never.includes(m.id)) return -999;          // hard block
  const seen = profile.events[m.id] && ["completed","liked","loved","hated","abandoned","rewatched","disliked","auto_pick"].includes(profile.events[m.id]);
  if(seen && !ctx.rewatch) return 0.05;
  if(profile.events[m.id]==="want") return 1;          // want-to-watch -> resurface first
  if(profile.watchlist.includes(m.id)) return 0.9;
  return 0.7;
}
function runtimeFit(m, timeAvail){
  if(!timeAvail) return 0.6;
  if(m.runtime<=timeAvail) {
    // reward using the window without wildly under-shooting
    const slack=timeAvail-m.runtime;
    return Math.max(0.55, 1 - slack/240);
  }
  const over=m.runtime-timeAvail;
  return Math.max(0, 0.5 - over/90);   // penalty grows with overrun
}
function qualityPrior(m){ return m.quality; }
function trendScore(m){ return m.trend; }
function explorationBoost(m, tasteVec){
  // small boost for adjacent-but-not-core genres
  const sim=cosine(tasteVec, MOVIE_VECS[m.id]);
  return (sim>0.2 && sim<0.55) ? 1 : 0.2;
}
function penalties(m, profile, ctx){
  let p=0;
  if(profile.never.includes(m.id)) p+=999;
  if(ctx.gore!=null && m.gore>ctx.gore+0.01) p+=(m.gore-ctx.gore)*0.6;     // over gore tolerance
  if(ctx.time && m.runtime>ctx.time) p+=Math.min(0.4,(m.runtime-ctx.time)/300);
  if(ctx.family && (m.age==="R"||m.scare>0.6||m.gore>0.4)) p+=0.6;          // kid-safe hard-ish filter
  return p;
}

// personal taste-only score for one profile (used by group fairness)
function personalScore(m, profile){
  return cosine(buildTasteVectorCached(profile), MOVIE_VECS[m.id]);
}
const _vecCache=new WeakMap();
function buildTasteVectorCached(profile){
  if(_vecCache.has(profile)) return _vecCache.get(profile);
  const v=buildTasteVector(profile); _vecCache.set(profile,v); return v;
}
function clearVecCache(){ /* WeakMap auto, but force rebuild by replacing objects */ }

// group fairness (blueprint §7.5)
function groupFit(m, profiles){
  if(profiles.length<2) return 0.75;
  const scores=profiles.map(p=>Math.max(0,personalScore(m,p)));
  const min=Math.min(...scores), avg=scores.reduce((a,b)=>a+b,0)/scores.length;
  const disagree=Math.max(...scores)-min;
  return Math.max(0, 0.65*avg + 0.35*min - 0.15*disagree);
}

/* ----------------------------------------------------------------
   3b. INTENSITY INDEX  —  slow burn (low) → edge of your seat (high)
-----------------------------------------------------------------*/
const PACE_V={slow:0.10,balanced:0.50,fast:0.92};
function rawIntensity(m){
  const t=x=>m.tone.includes(x)?1:0;
  let s=0.40*PACE_V[m.pacing]+0.16*m.scare+0.18*m.violence+0.08*m.gore
       +0.18*t("tense")+0.06*m.complexity+0.05*t("bleak")+0.04*t("dark")
       -0.10*t("light")-0.07*t("funny")-0.06*t("uplifting")-0.05*t("emotional");
  if(m.pacing==="fast"&&(m.violence>0.5||t("tense"))) s+=0.12;  // relentless adrenaline
  if(m.scare>0.7) s+=0.04;                                      // sustained dread
  return s;
}
const _rawI=MOVIES.map(rawIntensity), _loI=Math.min(..._rawI), _hiI=Math.max(..._rawI);
function intensityOf(m){ return Math.round(3+94*(rawIntensity(m)-_loI)/(_hiI-_loI)); }
const INTENSITY=Object.fromEntries(MOVIES.map(m=>[m.id,intensityOf(m)]));
const INTENSITY_BANDS=[
 {min:0 ,max:24 ,key:"slow_burn",label:"Slow burn"        ,color:"#5aa0ff"},
 {min:25,max:44 ,key:"simmer"   ,label:"Simmer"           ,color:"#6ce0c2"},
 {min:45,max:64 ,key:"steady"   ,label:"Steady tension"   ,color:"#ffd23f"},
 {min:65,max:84 ,key:"gripping" ,label:"Gripping"         ,color:"#ff8a5b"},
 {min:85,max:100,key:"edge"     ,label:"Edge of your seat",color:"#ff5470"}
];
function bandOf(v){ return INTENSITY_BANDS.find(b=>v>=b.min&&v<=b.max)||INTENSITY_BANDS[0]; }
function intensityFit(m,target){
  if(target==null) return 0.6;                                  // no preference -> neutral
  return Math.max(0, 1 - Math.abs(INTENSITY[m.id]-target)/55);  // tolerance band
}
function intensityPenalty(m,ctx){
  if(ctx.pace!=null && ctx.pace<35 && INTENSITY[m.id]>70) return 0.12;  // wanted calm, got relentless
  if(ctx.mood==="background" && INTENSITY[m.id]>72) return 0.10;
  return 0;
}
// trust personal taste more as the user rates more (shrinkage)
function profileConfidence(profile){
  const n=Object.values(profile.events).filter(e=>["loved","liked","completed","hated","rewatched","disliked"].includes(e)).length;
  return n/(n+8);
}

/* ----------------------------------------------------------------
   4. FINAL SCORE  (blueprint §7 + intensity dimension)
-----------------------------------------------------------------*/
const WEIGHTS={taste:.28,mood:.14,intensity:.12,availability:.12,novelty:.08,runtime:.07,group:.06,quality:.06,trend:.04,exploration:.03};
// "Mood changes weights, filters, and explanations" (blueprint §8).
// Mood, an explicit pace choice, and group mode all rebalance the weights.
function weightsFor(ctx){
  const w={...WEIGHTS};
  if(ctx.pace!=null){ w.intensity=0.20; w.taste=0.20; }        // user dialed the vibe -> honour it
  if(ctx.profiles.length>1){ w.group=0.18; w.taste=Math.min(w.taste,0.16); }
  switch(ctx.mood){
    case "family":       w.taste=0.10; w.mood=0.26; w.quality=0.10; break;
    case "background":
    case "no_thinking":  w.taste=0.16; w.mood=0.22; break;
    case "date_night":   w.taste=0.16; w.mood=0.20; if(ctx.profiles.length>1) w.group=0.16; break;
  }
  return w;
}
function scoreMovie(m, ctx){
  const profiles=ctx.profiles; const W=weightsFor(ctx);
  const tv=buildTasteVectorCached(profiles[0]);
  const conf=profileConfidence(profiles[0]);
  const rawTaste=Math.max(0,cosine(tv, MOVIE_VECS[m.id]));
  const taste=conf*rawTaste + (1-conf)*0.45*m.quality;          // shrink to quality prior when little data
  const mood=moodFit(m,ctx.mood);
  const intensity=intensityFit(m,ctx.pace);
  const availability=availabilityFit(m,ctx.services);
  const novelty=noveltyFit(m,profiles[0],ctx);
  const runtime=runtimeFit(m,ctx.time);
  const group=groupFit(m,profiles);
  const quality=qualityPrior(m);
  const trend=trendScore(m);
  const exploration=explorationBoost(m,tv);
  const penalty=penalties(m,profiles[0],ctx)+intensityPenalty(m,ctx);
  let final = W.taste*taste + W.mood*mood + W.intensity*intensity + W.availability*availability
    + W.novelty*Math.max(0,novelty) + W.runtime*runtime + W.group*group
    + W.quality*quality + W.trend*trend + W.exploration*exploration - penalty;
  if(ctx.hiddenGem) final += 0.15*(1-trend);   // reward the lesser-known, de-emphasise the obvious
  return {m,W,conf,taste,mood,intensity,availability,novelty,runtime,group,quality,trend,exploration,penalty,final,
          reasons:buildReasons(m,{taste,mood,intensity,availability,runtime,group,quality},ctx)};
}

/* ----------------------------------------------------------------
   5. CANDIDATE GENERATION + DIVERSITY + PICK  (§7.2-7.6)
-----------------------------------------------------------------*/
function generateCandidates(ctx){
  const p=ctx.profiles[0];
  return MOVIES.filter(m=>{
    if(p.never.includes(m.id)) return false;                       // never suggest
    if(noveltyFit(m,p,ctx)<=0.05 && !ctx.rewatch) return false;    // already seen, no rewatch
    if(ctx.family && (m.age==="R")) return false;                  // age gate
    if(ctx.onlyMyServices && !m.providers.some(s=>ctx.services.includes(s))) return false; // subscription only
    if(ctx.pace!=null && Math.abs(INTENSITY[m.id]-ctx.pace)>58) return false;              // way off the vibe
    if(ctx.hiddenGem && m.trend>0.6) return false;                                         // hide the obvious blockbusters
    if(!minYearOk(m.year)) return false;                                                   // too old for this user
    return true;
  });
}
function rankAll(ctx){
  return generateCandidates(ctx).map(m=>scoreMovie(m,ctx)).sort((a,b)=>b.final-a.final);
}
// Maximal Marginal Relevance: keep the list relevant but varied (no 5 near-clones)
function mmrDiversify(scored,k,lambda){
  lambda=lambda==null?0.72:lambda;
  const chosen=[],pool=scored.slice();
  while(chosen.length<(k||scored.length) && pool.length){
    let best=-Infinity,bi=0;
    for(let i=0;i<pool.length;i++){
      let maxSim=0;
      for(const c of chosen){ const s=cosine(MOVIE_VECS[pool[i].m.id],MOVIE_VECS[c.m.id]); if(s>maxSim)maxSim=s; }
      const mmr=lambda*pool[i].final-(1-lambda)*maxSim;
      if(mmr>best){best=mmr;bi=i;}
    }
    chosen.push(pool.splice(bi,1)[0]);
  }
  return chosen;
}
function diversifiedRank(ctx,k){ return mmrDiversify(rankAll(ctx),k,0.72); }
// epsilon-greedy just-pick (§7.6) — explores a *diverse* adjacent pool
function justPick(ctx){
  const ranked=rankAll(ctx);
  if(ranked.length===0) return null;
  if(Math.random() < (ctx.exploration ?? 0.10) && ranked.length>3){
    const pool=mmrDiversify(ranked.slice(0,Math.min(12,ranked.length)),6,0.55).slice(1);
    return {pick:pool[Math.floor(Math.random()*pool.length)], ranked, explored:true};
  }
  return {pick:ranked[0], ranked, explored:false};
}

/* ----------------------------------------------------------------
   6. EXPLANATION ENGINE  (plain language reasons)
-----------------------------------------------------------------*/
function buildReasons(m, c, ctx){
  const out=[]; const I=INTENSITY[m.id]; const band=bandOf(I);
  const moodName={scary:"scary",funny:"funny",mind_bending:"mind-bending",family:"family",
    date_night:"date-night",background:"background",dark_weird:"dark & weird",no_thinking:"easy-watching"}[ctx.mood];
  if(c.taste>0.45) out.push(`Closely matches your taste fingerprint (${m.subgenres[0]?m.subgenres[0].replace(/_/g,' '):m.genres[0]}).`);
  else if(c.taste>0.25) out.push(`In line with what you tend to enjoy.`);
  if(ctx.pace!=null && c.intensity>0.7) out.push(`${band.label} energy (${I}/100) — matches your pace tonight.`);
  if(ctx.mood && c.mood>0.6) out.push(`Fits your ${moodName} mood.`);
  if(c.availability===1){ const sv=m.providers.find(p=>ctx.services.includes(p)); out.push(`Streaming now on ${SVCS[sv]?.name||sv} — no rental needed.`);}
  else if(m.rent) out.push(`Available to rent (not on your current services).`);
  if(ctx.time && m.runtime<=ctx.time) out.push(`Runs ${m.runtime} min — fits your ${ctx.time}-min window.`);
  if(ctx.profiles.length>1 && c.group>0.4) out.push(`Strong least-regret pick for everyone watching.`);
  if(c.quality>0.88) out.push(`Critically loved (top-tier audience score).`);
  if(out.length<2) out.push(`${band.label} pick for right now.`);
  return out.slice(0,4);
}

function agoStr(ts){
  const s=Math.max(1,Math.floor((Date.now()-ts)/1000));
  if(s<60) return "just now";
  const m=Math.floor(s/60); if(m<60) return m+"m ago";
  const h=Math.floor(m/60); if(h<24) return h+"h ago";
  const d=Math.floor(h/24); if(d<7) return d+"d ago";
  const w=Math.floor(d/7); if(w<5) return w+"w ago";
  return new Date(ts).toLocaleDateString();
}

/* spam gate — blocks links/promo/junk outright, flags shouty posts as pending */
function classifyComment(text){
  const t=(text||"").trim(), low=t.toLowerCase();
  if(t.length<2) return {ok:false,reason:"too short to post"};
  if(/(https?:\/\/|www\.|\b[\w.-]+\.(com|net|io|gg|ru|xyz|biz|info|shop)\b|@[\w-]+\.)/i.test(t)) return {ok:false,reason:"links & contact info aren't allowed"};
  if(/\b\d{7,}\b/.test(t)) return {ok:false,reason:"phone numbers aren't allowed"};
  if(/(buy now|click here|free money|make money|promo code|coupon|crypto|casino|viagra|earn \$|work from home|subscribe to|cash ?app|telegram|whats ?app|onlyfans|100% free|limited offer|dm me)/i.test(low)) return {ok:false,reason:"looks like promotional spam"};
  if(/(.)\1{6,}/i.test(t)) return {ok:false,reason:"spammy repeated characters"};
  const letters=(t.match(/[a-z]/gi)||[]).length;
  if(letters/Math.max(1,t.length) < 0.35) return {ok:false,reason:"not enough real text"};
  const caps=(t.match(/[A-Z]/g)||[]).length, bangs=(t.match(/[!?]/g)||[]).length;
  const shouty = (t.length>=10 && letters && caps/letters>0.7) || bangs>5;
  return {ok:true, verified:!shouty};   // shouty posts go to 'pending review'
}

function userTopGenre(){
  const tally={};
  for(const id in STATE.profiles.me.events){
    const ev=STATE.profiles.me.events[id];
    if(!["loved","liked","auto_pick","rewatched"].includes(ev)) continue;
    const mm=MOVIE_BY_ID[id]; if(!mm) continue;
    const w=(ev==="loved"||ev==="rewatched")?3:(ev==="liked")?2:1;
    (mm.genres||[]).forEach(g=>{ if(GENRE_ID[g]) tally[g]=(tally[g]||0)+w; });

}

// Curated in-universe / story order for franchises whose release order differs.
// key = TMDb collection id, value = movie ids in story (chronological) order.
const STORY_ORDER={
  10:[1893,1894,1895,11,1891,1892,140607,181808,181812], // Star Wars (Episodes I-IX)
  84:[87,85,89,217,1271588],                             // Indiana Jones (Temple of Doom set first)
  528:[280,218,296,534],                                 // Terminator (release≈story, kept explicit)
  // Alien saga in-universe order: Prometheus -> Covenant -> Alien -> Romulus -> Aliens -> Alien3 -> Resurrection
  8091:[70981,126889,348,945961,679,8077,8078],
  86311:[]                                               // (placeholder for MCU-style; falls back to release)
};
// Extra franchise map for search "connections" — links prequels/spinoffs even across TMDb collections.
// key = a tmdb movie id -> {name, related:[tmdb ids]} of same-universe films.
const FRANCHISE={
  name:"Alien",
  members:[348,679,8077,8078,70981,126889,945961],   // Alien, Aliens, Alien3, Resurrection, Prometheus, Covenant, Romulus
  note:"Same universe (the Alien saga). Note: Predator & the Alien vs. Predator crossovers are a separate franchise."
};
function franchiseFor(tmdbId){ return (FRANCHISE.members.includes(tmdbId))?FRANCHISE:null; }
function orderParts(parts,colId,mode){
  const clean=(parts||[]).filter(p=>p.release_date);
  const byDate=[...clean].sort((a,b)=>(a.release_date||"").localeCompare(b.release_date||""));
  if(mode!=="story") return byDate;
  const ord=STORY_ORDER[colId];
  if(!ord||!ord.length) return byDate;                   // no curated data -> release order
  const rank=new Map(ord.map((mid,i)=>[mid,i]));
  // curated ids first (in story order); any extras fall to the end by release date
  return byDate.slice().sort((a,b)=>{
    const na=rank.has(a.id)?rank.get(a.id):1000, nb=rank.has(b.id)?rank.get(b.id):1000;
    if(na!==nb) return na-nb;
    return (a.release_date||"").localeCompare(b.release_date||"");
  });
}

// swipe the movie sheet down to dismiss (drag the grab handle or the hero)
function bindSheetSwipe(){
  const sheet=document.getElementById("msheet"); const inner=sheet&&sheet.querySelector(".msheet");
  const grab=document.getElementById("msGrab"); if(!inner||!grab) return;
  let startY=0, dragging=false, dy=0;
  const onStart=(e)=>{ startY=(e.touches?e.touches[0].clientY:e.clientY); dragging=true; dy=0; inner.style.transition="none"; };
  const onMove=(e)=>{ if(!dragging) return; const y=(e.touches?e.touches[0].clientY:e.clientY); dy=Math.max(0,y-startY); inner.style.transform="translateY("+dy+"px)"; };
  const onEnd=()=>{ if(!dragging) return; dragging=false;
    if(dy>100){ inner.style.transform=""; inner.style.transition=""; closeSheet(); }
    else { inner.style.transition="transform .28s cubic-bezier(.32,.72,0,1)"; inner.style.transform="translateY(0)"; setTimeout(()=>{ inner.style.transform=""; inner.style.transition=""; },300); } };
  grab.ontouchstart=onStart; grab.ontouchmove=onMove; grab.ontouchend=onEnd;
  grab.onmousedown=onStart; window.onmousemove=(e)=>{ if(dragging) onMove(e); }; window.onmouseup=(e)=>{ if(dragging) onEnd(); };
  const hero=document.getElementById("shHero");
  if(hero){ hero.ontouchstart=onStart; hero.ontouchmove=onMove; hero.ontouchend=onEnd; }
}

// the currently displayed card (so comments can re-render without re-picking)
let curPick=null, curExplored=false, curCtx=null, cardCommentsOpen=false, cardSpoilers=false, cardLocked=false, cardActionsOpen=false;
let skipStreak=0; const SKIP_LIMIT=3;   // Last Pick: 3 spins, then it locks (unless "keep spinning" is on)
let vibeOpen=false, pickSpins=0;        // Pick screen: vibe controls collapsed by default; count spins this session
function showPickCard(pick,explored,ctx,scroll,locked){
  if(locked!==undefined) cardLocked=locked;
  curPick=pick; curExplored=explored; curCtx=ctx;
  const box=app.querySelector("#pickResult");
  box.innerHTML=pickCardHTML(pick,explored,ctx);
  bindPickCard(pick,ctx);
  hydratePosters();
  if(scroll){ const el=box.querySelector(".pick"); if(el) el.scrollIntoView({behavior:"smooth",block:"center"}); }
}
function refreshCard(){ if(curPick&&curCtx) showPickCard(curPick,curExplored,curCtx,false); }
// pick a fresh film for a spin: never repeat the last one, spread across the strong candidates
function pickFrom(ranked){
  if(!ranked.length) return null;
  const lastId = curPick && curPick.m && curPick.m.id;
  let pool = ranked.filter(s=>s.m && s.m.id!==lastId);
  if(!pool.length) pool = ranked;
  const top = pool.slice(0, Math.min(8, pool.length));   // choose among the top handful for variety
  return top[Math.floor(Math.random()*top.length)];
}
function doPick(spin,onRevealed){
  const ctx=ctxFromState();
  const box=app.querySelector("#pickResult");
  if(spin && !STATE.context.keepSpin) skipStreak++;                                             // every spin counts toward the lock
  const locked = !STATE.context.keepSpin && skipStreak>=SKIP_LIMIT; if(locked) skipStreak=0;   // no lock when "keep spinning" is on
  const reveal=(pick,explored)=>{
    cardCommentsOpen=false; cardSpoilers=false;
    showPickCard(pick,explored,ctx,true,locked);
    if(locked){ toast("🔨 That's 3 — Last Pick locked it. You're watching this one.");
      const pb=app.querySelector("#pickBtn"); if(pb){ pb.textContent="🔒 Locked in — you're watching this"; pb.disabled=true; pb.style.opacity=".55"; } }
    if(onRevealed) onRevealed(pick);
  };
  const present=(pick,explored)=>{
    STATE.picks++; STATE.lastPick=pick.m.id; save();
    if(spin && box) spinToPick(pick, ()=>reveal(pick,explored), locked);
    else reveal(pick,explored);
  };
  function localPick(){
    const ranked=rankAll(ctx);
    const pick=pickFrom(ranked);
    if(!pick){ if(box) box.innerHTML=`<div class="empty">No matches with these filters. Try clearing mood/time or adding services.</div>`; return; }
    present(pick, pick!==ranked[0]);
  }
  if(tmdbReady()){
    if(box && !spin) box.innerHTML=`<div class="muted" style="font-size:13px;padding:18px 2px">🍿 Finding something great from the full catalog…</div>`;
    tmdbRecommend(ctx).then(ranked=>{
      const pick=pickFrom(ranked);
      if(!pick){ if(box) box.innerHTML=`<div class="empty">No match — try a different mood or clear filters.</div>`; return; }
      present(pick, pick!==ranked[0]);
    }).catch(e=>{ if(box) box.innerHTML=`<div class="empty">Couldn't reach TMDb — ${esc(e.message||'error')}.</div>`; });
    return;
  }
  localPick();
}
// slot-reel: big poster cards whip side to side, decelerate, and land on the chosen film
function spinToPick(pick, onDone, locked){
  const box=app.querySelector("#pickResult"); if(!box){ onDone(); return; }
  const pool=MOVIES.filter(m=>m && !STATE.profiles.me.never.includes(m.id));
  const src=pool.length?pool:[pick.m];
  const rnd=()=>src[Math.floor(Math.random()*src.length)];
  // poster-size cards: wide centered card with neighbours peeking at the edges
  const boxW=box.clientWidth||app.clientWidth||360;
  const W=Math.round(Math.min(320, boxW*0.70)), H=Math.round(W*1.42), GAP=14, ITEM=W+GAP;
  const N=40, winIdx=34;
  const reel=[]; for(let i=0;i<N;i++) reel.push(rnd());
  reel[winIdx]=pick.m;
  const cards=reel.map((m,i)=>{
    const bg=m.c?poster(m.c[0],m.c[1]):(m.poster?`#000 center/cover url('${tmdbPoster(m.poster,'w342')}')`:'#222');
    return `<div class="spincard${i===winIdx?' win':''}" data-pm="${m.id}" style="width:${W}px;height:${H}px;background:${bg}"></div>`;
  }).join("");
  box.innerHTML=`<div class="spinwrap" id="spinWrap" style="min-height:${H+28}px"><div class="spinmark"></div><div class="spinreel" id="spinReel" style="transform:translateX(0)">${cards}</div></div>
    <div class="spinlabel" id="spinLabel">🎰 ${locked?'No more skips — Last Pick is deciding…':'Last Pick is spinning…'}</div>`;
  hydratePosters();
  const wrap=document.getElementById("spinWrap"), reelEl=document.getElementById("spinReel");
  const vw=(wrap&&wrap.clientWidth)||boxW;
  const finalX=-(winIdx*ITEM + W/2 - vw/2);
  const pbtn=app.querySelector("#pickBtn"); if(pbtn){ pbtn.disabled=true; pbtn.style.opacity=".55"; }
  let done=false;
  const finish=()=>{ if(done)return; done=true;
    const w=box.querySelector(".spincard.win"); if(w) w.classList.add("pop");
    const lbl=document.getElementById("spinLabel"); if(lbl) lbl.textContent="🎯 Your Last Pick!";
    const pb2=app.querySelector("#pickBtn"); if(pb2 && !(cardLocked&&!STATE.context.keepSpin)){ pb2.disabled=false; pb2.style.opacity="1"; }
    setTimeout(onDone,700); };
  // wind-up: scale down a touch, then launch into the spin
  if(wrap) wrap.classList.add("windup");
  setTimeout(()=>{
    if(wrap) wrap.classList.remove("windup");
    requestAnimationFrame(()=>{
      if(!reelEl) return finish();
      reelEl.style.transition="transform 3.3s cubic-bezier(.13,.72,.11,1)";
      reelEl.style.transform=`translateX(${finalX}px)`;
    });
  },210);
  if(reelEl) reelEl.addEventListener("transitionend",finish,{once:true});
  setTimeout(finish,4000);   // safety net
}
// pre-load the #1 best pick on the Pick screen (no spin) so there's always a movie waiting
function previewTopPick(){
  const ctx=ctxFromState(); const box=app.querySelector("#pickResult"); if(!box) return;
  const show=(pick)=>{ curPick=pick; curExplored=false; curCtx=ctx; cardLocked=false; STATE.lastPick=pick.m.id;
    if(app.querySelector("#pickResult")) showPickCard(pick,false,ctx,false,false); };
  if(tmdbReady()){
    box.innerHTML=`<div class="muted" style="font-size:13px;padding:22px 2px;text-align:center">🎬 Lining up your top pick…</div>`;
    tmdbRecommend(ctx).then(r=>{ if(TAB==="pick" && r && r.length) show(r[0]);
      else if(TAB==="pick"){ const lr=rankAll(ctx); if(lr.length) show(lr[0]); } })
      .catch(()=>{ if(TAB==="pick"){ const lr=rankAll(ctx); if(lr.length) show(lr[0]); } });
  } else {
    const lr=rankAll(ctx); if(lr.length) show(lr[0]);
    else box.innerHTML=`<div class="empty">No matches — open Set the vibe and loosen your filters.</div>`;
  }
}

const SNACKS=[

  {k:"pizza",label:"🍕 Pizza & beer",pair:"A loaded pizza and something cold."},

  {k:"cozy",label:"🍵 Tea & cozy",pair:"Hot tea, a blanket, lights down low."}
];
let nightSnack=null;
function autoSnack(mood){ const map={scary:"spicy",funny:"pizza",date_night:"wine",family:"popcorn",background:"cozy",no_thinking:"pizza",dark_weird:"wine",mind_bending:"cozy"}; return SNACKS.find(s=>s.k===(map[mood]||"popcorn")); }
function planNight(shuffle){
  const out=app.querySelector("#pickResult"); if(!out) return;
  const ctx=ctxFromState();
  const ranked=diversifiedRank(ctx,10);
  if(ranked.length<1){ out.innerHTML=`<div class="empty">No matches — loosen the vibe.</div>`; return; }
  const mainIdx = shuffle ? Math.floor(Math.random()*Math.min(4,ranked.length)) : 0;
  const main=ranked[mainIdx];
  const backup=ranked.find(s=>s.m.id!==main.m.id)||main;
  const after=ranked.filter(s=>s.m.id!==main.m.id&&s.m.id!==backup.m.id&&s.m.runtime<100)[0]
            || ranked.find(s=>s.m.id!==main.m.id&&s.m.id!==backup.m.id) || null;
  const snack=(nightSnack&&SNACKS.find(s=>s.k===nightSnack))||autoSnack(ctx.mood);
  const total=main.m.runtime+(after?after.m.runtime:0);
  const moodLabel=ctx.mood?(MOODS.find(x=>x[0]===ctx.mood)||['',ctx.mood])[1]:'';
  out.innerHTML=`
    <div class="panel fadein" id="nightPlan" style="margin-top:16px;border-color:#4a2030">
      <div style="font-weight:900;font-size:16px;margin-bottom:2px">🍿 Tonight's plan</div>
      <div class="muted" style="font-size:12px;margin-bottom:13px">${ctx.profiles.length>1?'For both of you':'Just for you'}${moodLabel?' · '+moodLabel:''} · about ${Math.round(total/60*10)/10}h total</div>
      ${nightItem('MAIN FEATURE',main,ctx,true)}
      ${nightItem('BACKUP',backup,ctx,false)}
      ${after?nightItem('AFTER-MOVIE NIGHTCAP',after,ctx,false):''}
      <div style="display:flex;gap:10px;align-items:center;margin-top:6px;border-top:1px solid var(--line);padding-top:13px">
        <div style="font-size:24px">${snack.label.split(' ')[0]}</div>
        <div><div style="font-weight:700;font-size:13px">Snack pairing</div><div class="muted" style="font-size:12.5px">${esc(snack.pair)}</div></div>
      </div>
      <div class="row" style="margin-top:15px;flex-wrap:nowrap">
        <button class="btn" id="mnStart" style="flex:1;background:linear-gradient(135deg,#2e6bff,#22d3ee)">▶ Start the night</button>
        <button class="btn secondary" id="mnShuffle" style="flex:none;width:54px">🔀</button>
      </div>
    </div>`;

function scoreLegend(s){
  const W=s.W||WEIGHTS;
  const parts=[["taste",W.taste*s.taste,"#3b8cff"],["mood",W.mood*s.mood,"#ffb454"],
    ["avail",W.availability*s.availability,"#6ce0c2"],["novelty",W.novelty*Math.max(0,s.novelty),"#7c8cff"],
    ["runtime",W.runtime*s.runtime,"#5ad19a"],["group",W.group*s.group,"#e07cc2"],
    ["quality",W.quality*s.quality,"#c2e07c"],["trend",W.trend*s.trend,"#7cd8e0"]];
  const total=parts.reduce((a,b)=>a+b[1],0)||1;
  const bar=parts.map(p=>`<span style="width:${(p[1]/total*100).toFixed(1)}%;background:${p[2]}"></span>`).join("");
  const leg=parts.filter(p=>p[1]>0.004).map(p=>`<div><i style="background:${p[2]}"></i>${p[0]}</div>`).join("");
  return {bar,leg};
}

let specGenres=[], specMin=0, specMax=100;
function renderSpectrum(){
  app.innerHTML=header()+`

      <div style="display:flex;align-items:center;gap:10px">
        <input type="range" id="spMin" min="0" max="100" step="1" value="${specMin}" style="flex:1;accent-color:#5aa0ff">
        <input type="range" id="spMax" min="0" max="100" step="1" value="${specMax}" style="flex:1;accent-color:#ff5470">
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px"><span>🐌 Slow burn</span><span>Edge of seat 🔥</span></div>

      <div class="row">${ALL_GENRES.map(g=>`<div class="chip ${specGenres.includes(g)?'on':''}" data-spg="${g}">${genreLabel(g)} <span style="opacity:.55">${genreCount(g)}</span></div>`).join("")}</div>
      ${specGenres.length||specMin>0||specMax<100?`<button class="btn secondary" id="spReset" style="margin-top:13px">↺ Clear filters</button>`:''}
    </div>
    <div id="specOut"></div>
  `;
  app.querySelectorAll("[data-spg]").forEach(el=>el.onclick=()=>{
    const g=el.dataset.spg, i=specGenres.indexOf(g); if(i>=0)specGenres.splice(i,1); else specGenres.push(g); renderSpectrum();
  });
  const lo=app.querySelector("#spMin"), hi=app.querySelector("#spMax");

  const out=app.querySelector("#specOut"); if(!out) return;

function matchName(cast,t){ return (cast||[]).find(n=>n.toLowerCase().includes(t)) || (cast||[])[0] || ""; }
function searchMovies(q){
  q=q.trim().toLowerCase(); if(!q) return [];
  const toks=q.split(/\s+/).filter(Boolean);
  const res=[];
  for(const m of MOVIES){
    const title=m.title.toLowerCase();
    const cast=(m.cast||[]).join(", ").toLowerCase();
    const dir=(m.director||"").toLowerCase();
    const tags=m.genres.concat(m.subgenres,m.tone).join(" ").replace(/_/g," ").toLowerCase();
    const overview=(m.overview||"").toLowerCase();
    const quote=(m.quote||"").toLowerCase();
    const com=STATE.community[m.id]||{};
    const comTxt=((com.comments||[]).map(x=>x.text||"").concat((com.reviews||[]).map(x=>x.text||""),(com.summaries||[]).map(x=>x.text||""))).join("  ").toLowerCase();
    const yr=String(m.year);
    let score=0; const why=[];
    const add=(k,v)=>{ if(!why.some(w=>w[0]===k)) why.push([k,v]); };
    if(title.includes(q)){ score+=100; add("title",m.title); }
    if(cast.includes(q)){ score+=82; add("cast",matchName(m.cast,q)); }
    if(dir.includes(q)){ score+=72; add("director",m.director); }
    if(quote.includes(q)){ score+=80; add("quote",m.quote); }
    if(overview.includes(q)){ score+=44; add("plot",m.overview); }
    if(comTxt.includes(q)){ score+=50; add("comment",q); }
    if(tags.includes(q)){ score+=36; add("tag",q); }
    if(yr===q){ score+=30; add("year",yr); }
    if(score===0){
      let hits=0;
      for(const t of toks){
        if(title.includes(t)){score+=30;hits++;add("title",m.title);}
        else if(cast.includes(t)){score+=22;hits++;add("cast",matchName(m.cast,t));}
        else if(dir.includes(t)){score+=18;hits++;add("director",m.director);}
        else if(quote.includes(t)){score+=16;hits++;add("quote",m.quote);}
        else if(tags.includes(t)){score+=12;hits++;add("tag",t);}
        else if(comTxt.includes(t)){score+=10;hits++;add("comment",t);}
        else if(overview.includes(t)){score+=9;hits++;add("plot",m.overview);}
      }
      if(hits===0) score=0; else score*= hits/toks.length;   // reward matching more of the query
    }
    if(score>0) res.push({m,score,why});
  }
  return res.sort((a,b)=>b.score-a.score || b.m.quality-a.m.quality);
}
function whyLabel(w){

  if(k==="director") return "🎬 Dir. "+v;
  if(k==="quote")    return "“"+cut(v,64)+"”";
  if(k==="plot")     return cut(v,72);
  if(k==="comment")  return "💬 mentioned in a comment";

  let r; try{ r=await fetch(url.toString(),opts); }catch(e){ throw new Error("Network blocked — open over https or check your connection"); }

async function drainPosters(){

    const {id,m,el}=_pQueue.shift();
    if(POSTERS[id]!==undefined){ if(POSTERS[id]) setPoster(el,POSTERS[id]); continue; }
    try{

const MOOD_TMDB={scary:"27",funny:"35",mind_bending:"878,9648",family:"10751,16",
  date_night:"10749,35",background:"35,18",dark_weird:"18,9648,53",no_thinking:"28,12,35"};
const GENRE_INT={28:78,27:80,53:74,80:60,12:58,878:60,9648:56,18:38,14:50,10752:70,37:55,
  35:22,10749:18,10751:14,16:26,99:20,10402:26,36:36,10770:30};
function estIntensity(genreIds){
  const v=(genreIds||[]).map(id=>GENRE_INT[id]).filter(x=>x!=null);
  if(!v.length) return 50;
  return Math.round(Math.max(...v)*0.6 + (v.reduce((a,b)=>a+b,0)/v.length)*0.4);
}
function tmdbToMovie(t){
  const id="tmdb_"+t.id;

  const genres=(t.genre_ids||[]).map(g=>(TMDB_GENRES[g]||"").toLowerCase().replace("science fiction","scifi").replace("sci-fi","scifi")).filter(Boolean);
  const m={id,tmdbId:t.id,title:t.title||t.name||"Untitled",year:+((t.release_date||"").slice(0,4))||0,
    runtime:t.runtime||0,age:"",genres,subgenres:[],tone:[],pacing:"balanced",
    scare:0,gore:0,violence:0,complexity:0,quality:(t.vote_average||6)/10,
    trend:Math.min(1,(t.popularity||0)/200),rewatchable:0.5,providers:[],rent:true,
    c:null,poster:t.poster_path,overview:t.overview||"",cast:[],director:"",quote:""};
  MOVIE_BY_ID[id]=m; INTENSITY[id]=estIntensity(t.genre_ids);

}
function tmdbRecReasons(m,ctx,iFit,aff,seedBoost){
  const out=[]; const band=bandOf(INTENSITY[m.id]);
  if(seedBoost) out.push("Because you liked similar films.");
  else if(aff!=null && aff>0.62 && (m.genres||[]).length) out.push(`Matches your taste for ${m.genres.slice(0,2).join(" & ")}.`);
  if(ctx.mood) out.push(`Chosen for your ${ctx.mood.replace(/_/g,' ')} mood.`);
  out.push(`${band.label} energy (${INTENSITY[m.id]}/100)${ctx.pace!=null?' — matches your pace':''}.`);
  if(m.quality>=0.72) out.push(`Highly rated — ${(m.quality*10).toFixed(1)}/10 on TMDb.`);

/* ---- personalization: taste profile built from the user's watch history ---- */
function tmdbTasteProfile(){
  const ev=(STATE.profiles.me.events)||{};
  const POS={loved:3,rewatched:3,liked:2,want:1.2,auto_pick:2,completed:0.6,saved:0.8};
  const NEG={disliked:-2.5,hated:-3.5,not_tonight:-0.4};
  const gW={}; const seeds=[]; let signal=0;
  for(const id in ev){
    const e=ev[id]; const w=POS[e]!=null?POS[e]:(NEG[e]!=null?NEG[e]:0);
    if(!w) continue;
    const m=MOVIE_BY_ID[id]; if(!m) continue;
    (m.genres||[]).forEach(g=>{ gW[g]=(gW[g]||0)+w; });
    signal+=Math.abs(w);
    if(w>=2 && m.tmdbId) seeds.push(m.tmdbId);
  }
  let max=1; for(const g in gW) max=Math.max(max,Math.abs(gW[g]));
  for(const g in gW) gW[g]=gW[g]/max;
  return {gW, seeds:seeds.slice(-5), signal, conf:signal/(signal+6)};
}
function genreAffinity(m,gW){
  const gs=m.genres||[]; if(!gs.length) return 0.5;
  let s=0; gs.forEach(g=>s+=(gW[g]||0)); s/=gs.length;
  return Math.max(0,Math.min(1,0.5+0.5*s));
}
// keep the recommendation row from being one-note (genre-aware diversity)
function tmdbDiversify(scored,k){
  const out=[],gc={},pool=scored.slice();
  while(out.length<Math.min(k||scored.length,scored.length)&&pool.length){
    let bi=0,best=-Infinity;
    for(let i=0;i<pool.length;i++){ const g=(pool[i].m.genres||[])[0]||""; const v=pool[i].final-0.06*(gc[g]||0); if(v>best){best=v;bi=i;} }
    const ch=pool.splice(bi,1)[0]; const g=(ch.m.genres||[])[0]||""; gc[g]=(gc[g]||0)+1; out.push(ch);
  }
  return out;
}

async function tmdbRecommend(ctx){
  const tp=tmdbTasteProfile();
  const params={sort_by:"popularity.desc",include_adult:"false","vote_count.gte":"150",
    page:String(1+Math.floor(Math.random()*5))};
  if(ctx.mood && MOOD_TMDB[ctx.mood]) params.with_genres=MOOD_TMDB[ctx.mood];
  // bias discover toward the user's favourite genres once we have signal
  if(!params.with_genres){
    const top=Object.keys(tp.gW).filter(g=>tp.gW[g]>0.35).map(g=>GENRE_ID_BY_NAME[g]).filter(Boolean);
    if(top.length) params.with_genres=top.slice(0,3).join("|");
  }
  if(ctx.time) params["with_runtime.lte"]=String(ctx.time);
  Object.assign(params, minYearParam());
  Object.assign(params, watchParams());   // strict availability: free-to-watch / my services only
  // pool = popular discover + "more like films you loved" (collaborative signal from TMDb)
  const calls=[ tmdbFetch("/discover/movie",params).then(r=>r.results||[]).catch(()=>[]) ];
  const seedSet=new Set();
  tp.seeds.forEach(tid=>calls.push(
    tmdbFetch("/movie/"+tid+"/recommendations",{page:"1"})
      .then(r=>{ (r.results||[]).forEach(x=>seedSet.add(x.id)); return r.results||[]; }).catch(()=>[])
  ));
  const lists=await Promise.all(calls);
  const merged=[], seenIds=new Set();
  lists.flat().forEach(t=>{ if(t&&t.id&&!seenIds.has(t.id)){ seenIds.add(t.id); merged.push(t); } });
  const seen=STATE.profiles.me.events||{}, never=STATE.profiles.me.never||[];
  const pool=merged.filter(t=>t.poster_path).map(tmdbToMovie)
    .filter(m=>!never.includes(m.id) && !(seen[m.id] && !ctx.rewatch) && minYearOk(m.year));
  const wAff=0.20+0.24*tp.conf;   // trust taste more as history grows
  const scored=pool.map(m=>{
    const intensity = ctx.pace!=null ? Math.max(0,1-Math.abs(INTENSITY[m.id]-ctx.pace)/55) : 0.6;
    const aff=genreAffinity(m,tp.gW);
    const seedBoost=seedSet.has(m.tmdbId)?1:0;
    const final = wAff*aff + 0.16*seedBoost*(0.4+tp.conf) + 0.20*m.quality
                + 0.16*intensity + 0.12*m.trend + 0.06*Math.random();
    return {m,final,aff,seedBoost,
      W:{taste:wAff,mood:0,intensity:.16,availability:0,novelty:0,runtime:0,group:0,quality:.20,trend:.12,exploration:.06},
      taste:aff,mood:1,intensity,availability:1,novelty:0.7,runtime:1,group:0.75,
      quality:m.quality,trend:m.trend,exploration:0,penalty:0,
      reasons:tmdbRecReasons(m,ctx,intensity,aff,seedBoost)};
  }).sort((a,b)=>b.final-a.final);
  return tmdbDiversify(scored,24);
}

/* ---------- REFINE: a mixing board to build a movie ---------- */
const REFINE_GENRES=[["horror","Horror"],["comedy","Comedy"],["thriller","Thriller"],["action","Action"],
  ["drama","Drama"],["scifi","Sci-fi"],["romance","Romance"],["animation","Animation"],
  ["crime","Crime"],["fantasy","Fantasy"],["adventure","Adventure"]];
const REFINE_DIMS=[["intensity","Intensity (slow → edge)","🐌"],["scare","Scares","😱"],
  ["gore","Gore","🩸"],["violence","Action / violence","💥"],["complexity","Brain-bending","🧠"]];
const DIM_VAL={ intensity:m=>INTENSITY[m.id]/100, scare:m=>m.scare, gore:m=>m.gore, violence:m=>m.violence, complexity:m=>m.complexity };

function refineScore(m,R){
  if(m.runtime>R.maxRuntime) return null;
  if(m.quality*100 < R.minQuality) return null;
  if(R.onlyServices && !m.providers.some(s=>STATE.services.includes(s))) return null;
  if(STATE.profiles.me.never.includes(m.id)) return null;
  let score=0, maxp=0, hits=[];
  for(const [k] of REFINE_GENRES){ const s=R.genres[k]||0; if(s>0){ maxp+=s; if(m.genres.includes(k)){ score+=s; hits.push(k);} } }
  for(const [k] of REFINE_DIMS){ const t=R[k]; if(t!=null){ const w=55; maxp+=w; score+=w*(1-Math.abs(DIM_VAL[k](m)-t/100)); } }
  const pct = maxp>0 ? 100*score/maxp : m.quality*100;
  return {m,pct,base:maxp===0,hits};
}
function rankRefine(R){ return MOVIES.map(m=>refineScore(m,R)).filter(Boolean).sort((a,b)=>b.pct-a.pct); }
function refineActive(R){
  return Object.values(R.genres).some(v=>v>0) || REFINE_DIMS.some(([k])=>R[k]!=null) || R.minQuality>0 || R.maxRuntime<240 || R.onlyServices;
}

// inline comment post — text + spoiler come from the composer; saves to the DB when signed in
async function postComment(id, text, spoiler, after){
  const t=(text||"").trim(); if(!t){ toast("Write something first."); return; }
  const cls=classifyComment(t);
  if(!cls.ok){ toast("🚫 Blocked: "+cls.reason); return; }
  const tmdb=(typeof tmdbNum==="function")?tmdbNum(id):null;
  if(typeof SB!=="undefined" && SB && CLOUD_USER && tmdb){
    const r=await dbAddComment(tmdb, t, !!spoiler, null);
    if(r.error){ toast("Couldn't post — "+(r.error.message||r.error)); return; }
    try{ const dbc=await dbFetchComments(tmdb); if(dbc!=null){ const cc=STATE.community[id]||(STATE.community[id]={summaries:[],reviews:[],comments:[]}); cc.comments=dbc; } }catch(e){}
    logActivity("comment",id,{text:t,spoiler:!!spoiler});
    sheetCompose=false; sheetComposeSpoiler=false;
    toast("💬 Posted"); if(after) after(); else if(typeof renderSheet==="function"&&sheetId===id) renderSheet(id);
    return;
  }
  // guest, offline, or non-TMDb title -> local only (this session)
  const cc=STATE.community[id]||(STATE.community[id]={summaries:[],reviews:[],comments:[]});
  cc.comments.unshift({by:"You",text:t,spoiler:!!spoiler,verified:cls.verified,flags:0,flaggedBy:[]});
  logActivity("comment",id,{text:t,spoiler:!!spoiler});
  save(); sheetCompose=false; sheetComposeSpoiler=false;
  toast(CLOUD_USER?"💬 Posted":"💬 Posted — log in to save it");
  if(after) after(); else if(typeof renderSheet==="function"&&sheetId===id) renderSheet(id);
}

// community flags a comment as containing a spoiler
async function flagSpoiler(id, idx){
  const c=STATE.community[id]; if(!c) return;
  const cm=c.comments[idx]; if(!cm || cm.spoiler) return;
  const tmdb=(typeof tmdbNum==="function")?tmdbNum(id):null;
  if(typeof SB!=="undefined" && SB && CLOUD_USER && tmdb && cm.dbId){
    const r=await dbFlagComment(cm.dbId);
    if(r.error){ toast(String(r.error.message||r.error).indexOf("duplicate")>=0?"You already flagged this one.":"Couldn't flag it."); return; }
    try{ const dbc=await dbFetchComments(tmdb); if(dbc!=null) c.comments=dbc; }catch(e){}
    toast("🚩 Flagged as spoiler."); if(sheetId===id && typeof renderSheet==="function") renderSheet(id); return;
  }
  cm.flaggedBy=cm.flaggedBy||[];
  if(cm.flaggedBy.includes("You")){ toast("You already flagged this one."); return; }
  cm.flaggedBy.push("You"); cm.flags=(cm.flags||0)+1;
  if(cm.flags>=SPOILER_VOTES){
    cm.spoiler=true;                                   // auto-move to the spoiler section

      logActivity("modnote",id,{});
      setTimeout(()=>alert(`⚠ Heads up\n\nYour comment on “${(MOVIE_BY_ID[id]||{}).title||'this film'}” was marked as a spoiler by ${SPOILER_VOTES}+ people and moved to the spoiler section.\n\nPlease keep regular comments spoiler-free so nobody gets spoiled. 🙏`),120);
    }
    toast("🚩 Marked a spoiler by the community — moved to spoilers.");
  } else {
    toast(`🚩 Flagged as spoiler (${cm.flags}/${SPOILER_VOTES}) — ${SPOILER_VOTES-cm.flags} more to hide it.`);
  }
  save();
}

// ---- feed condensing: collapse rapid "spree" bursts into one summary ----
let feedGroupsOpen=new Set();
const GROUPABLE=["completed","liked","disliked","loved","want","watchlist","rewatched","auto_pick","not_tonight","ult"];
function condenseFeed(feed){
  const out=[]; let i=0;
  while(i<feed.length){
    const a=feed[i];
    if(GROUPABLE.includes(a.type)){
      // a run of consecutive library/ranking actions (any mix) within a ~30-min burst
      let j=i; const run=[];
      while(j<feed.length && GROUPABLE.includes(feed[j].type) && (run.length===0 || Math.abs((run[run.length-1].ts||0)-(feed[j].ts||0))<=30*60000)){ run.push(feed[j]); j++; }
      if(run.length>=4){ out.push({group:true,entries:run,ts:run[0].ts,key:"g"+(run[0].ts||i)+"_"+run.length}); }
      else run.forEach(e=>out.push(e));
      i=j;
    } else { out.push(a); i++; }
  }
  return out;
}
function summarizeGroup(entries){
  const n=entries.length; const kinds=new Set(entries.map(e=>e.type));
  const ult=kinds.has("ult"), other=[...kinds].some(t=>t!=="ult");
  if(ult&&!other) return `🏅 made ${n} Ultimate Ten changes`;
  if(ult&&other) return `⚡ went on a spree — ${n} library updates`;
  return `🎬 rated & logged ${n} films`;
}

function openUltPicker(genre){

  const seen=new Set(),list=[];
  const add=m=>{ if(m && !seen.has(m.id) && (m.genres||[]).includes(genre)){ seen.add(m.id); list.push(m); } };
  myFaves().forEach(f=>add(f.m)); watchAgainList().forEach(add);
  (STATE.profiles.me.watchlist||[]).forEach(id=>add(MOVIE_BY_ID[id]));
  Object.keys(STATE.profiles.me.events||{}).forEach(id=>add(MOVIE_BY_ID[id]));
  const cur=STATE.profile.genreTop[genre]||[];
  const avail=list.filter(m=>!cur.includes(m.id));
  if(!avail.length){ toast(`Rate or save a few ${gl} films first — then build your Ultimate Ten.`); return; }
  let ov=document.getElementById("coverov"); if(ov) ov.remove();
  ov=document.createElement("div"); ov.id="coverov";

const KID_FLIP_MAX=10;
let kidPick=null, kidFlips=0, kidBusy=false;
function kidPool(){
  return MOVIES.filter(m=> m && (["G","PG","TV-Y","TV-G","TV-PG"].includes(m.age) || (m.genres||[]).some(g=>["family","animation"].includes(g)))
    && (m.scare||0)<0.45 && (m.gore||0)<0.2 && (m.violence||0)<0.5 );

function openKidsMode(){
  if(!STATE.kids) STATE.kids={pin:null};
  if(!STATE.kids.pin){
    const p=prompt("👪 Parent setup\n\nCreate a 4-digit PIN to lock Kids Mode.\nKids can't leave Kids Mode without it.");
    if(p===null) return;
    const pin=(p||"").replace(/\D/g,"").slice(0,4);
    if(pin.length<4){ toast("Please enter 4 digits."); return; }
    STATE.kids.pin=pin; save();
    alert("✅ PIN set. Keep it handy — it's the only way out of Kids Mode.");
  }
  kidFlips=0; kidPick=null; kidBusy=false; renderKids();
}
function exitKidsMode(){
  const p=prompt("🔒 Enter parent PIN to leave Kids Mode:");
  if(p===null) return;
  if((p||"").trim()===STATE.kids.pin){ const ov=document.getElementById("kidsov"); if(ov) ov.remove(); }
  else toast("❌ Wrong PIN — ask a grown-up.");
}
async function kidsFindMovie(){
  if(kidBusy) return;
  if(kidPick && kidFlips>=KID_FLIP_MAX) return;   // out of flips — must watch
  if(kidPick) kidFlips++;
  kidBusy=true;
  const lbl=document.getElementById("kAnother"); if(lbl) lbl.textContent="🎬 finding…";
  let m=null;
  try{
    if(tmdbReady()){
      const r=await tmdbFetch("/discover/movie",{with_genres:"16,10751",certification_country:"US","certification.lte":"PG",
        sort_by:"popularity.desc",include_adult:"false","vote_count.gte":"80",page:String(1+Math.floor(Math.random()*6))});
      const cands=(r.results||[]).filter(x=>x.poster_path && (!kidPick || x.id!==kidPick.tmdbId));
      if(cands.length){ m=tmdbToMovie(cands[Math.floor(Math.random()*cands.length)]); }
    }
  }catch(e){}
  if(!m){ const pool=kidPool().filter(x=>!kidPick||x.id!==kidPick.id); const base=pool.length?pool:kidPool(); if(base.length) m=base[Math.floor(Math.random()*base.length)]; }
  kidBusy=false;
  if(m){ kidPick=m; renderKids(); }
  else { const a=document.getElementById("kAnother"); if(a) a.textContent="🔄 Show me another"; toast("Hmm, couldn't find one — try again."); }
}

  let ov=document.getElementById("kidsov");

      `}

    <details style="margin-top:22px">
      <summary style="font-size:12px;color:var(--muted);cursor:pointer;list-style:none">⚙️ Advanced settings</summary>
      <div class="panel" style="margin-top:10px;border-color:#ff6b7d33">
        <div style="font-size:12px;font-weight:700;color:#ff9aa6">DANGER ZONE</div>
        <div class="muted" style="font-size:12px;margin:4px 0 10px">Wipe everything on this device and start fresh. This can't be undone.</div>
        <button class="btn secondary" id="acReset" style="border-color:#ff6b7d55;color:#ffb3bd">↺ Reset all my data</button>
      </div>
    </details>
  `;
  const msg=m=>{ const el=app.querySelector("#acMsg"); if(el) el.textContent=m; };
  const so=app.querySelector("#acSignOut"); if(so) so.onclick=async()=>{ await cloudSignOut(); renderAccount(); };
  const rst=app.querySelector("#acReset"); if(rst) rst.onclick=()=>{ if(confirm("Reset ALL your data on this device (picks, history, profile)?") && confirm("Are you sure? This can't be undone.")){ STATE=DEFAULT_STATE(); onboardIdx=0; onboardQueue=[]; save(); renderWelcome(); } };
  const afterAuth=()=>{ STATE.guest=false; STATE.onboarded=true; save(); if(fromWelcome){ fromWelcome=false; TAB="pick"; renderTab(); } else renderAccount(); };
  const li=app.querySelector("#acLogin"); if(li) li.onclick=async()=>{
    const raw=app.querySelector("#acEmail").value.trim(), p=app.querySelector("#acPass").value;
    if(!raw||!p){ msg("Enter your username + password."); return; }
    const isEmail=raw.indexOf("@")>0; const e=isEmail?raw.toLowerCase():usernameToEmail(raw);
    msg("Logging in…"); const r=await cloudSignIn(e,p);
    if(r.error){ msg("❌ "+(/invalid login/i.test(r.error.message||"")?"Wrong username or password.":(r.error.message||r.error))); }
    else { STATE.profile=STATE.profile||{}; if(!isEmail&&!STATE.profile.username) STATE.profile.username=cleanUsername(raw); toast("✅ Signed in"); afterAuth(); } };
  const su=app.querySelector("#acSignup"); if(su) su.onclick=async()=>{
    const raw=app.querySelector("#acEmail").value.trim(), p=app.querySelector("#acPass").value;
    const isEmail=raw.indexOf("@")>0; const u=cleanUsername(raw);
    if(!isEmail && u.length<3){ msg("Pick a username (3+ letters/numbers, no spaces)."); return; }
    if(p.length<6){ msg("Password needs at least 6 characters."); return; }
    const e=isEmail?raw.toLowerCase():usernameToEmail(u);
    msg("Creating account…");
    const r=await cloudSignUp(e,p);
    if(r.error){ const m=(r.error.message||String(r.error)); msg("❌ "+(/already regist/i.test(m)?"That username is taken — pick another.":m)); }
    else if(r.data&&r.data.session){ STATE.profile=STATE.profile||{}; if(!isEmail){ STATE.profile.username=u; if(!STATE.profile.name||STATE.profile.name==="Movie Fan") STATE.profile.name=u; } await pullCloud(); pushCloud(); toast("🎉 Account created"); afterAuth(); }
    else { msg("Account made — now log in."); }
  };
  bindOAuth(app);
  bindHeader();
}

/* ---------- boot ---------- */
load();
if(STATE.onboarded) renderTab(); else renderWelcome();
cloudInit();
/* Last Pick — build synced for deploy */
</script>
</body>
</html>
